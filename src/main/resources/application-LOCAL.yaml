spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/users_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: "local-dev-secret-local-dev-secret-local-dev"
  expiration: 86400000
